# Stack de DESARROLLO de Baigorria (local, Windows + Docker) — solo infraestructura.
# La UI es la app custom (web/ React + api/ Express), que en dev se corren con npm.
# Servicios: PostgreSQL · n8n (automatización) · mock-isis-api (capa ISIS simulada).
# NocoDB fue descartado (Enterprise gateaba roles+branding). Listmonk: feature futura.
# Para producción/deploy ver compose.prod.yml + docs/DEPLOY.md.

services:
  postgres:
    image: postgres:16
    container_name: baigorria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: baigorria
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d baigorria"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    container_name: baigorria-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_PORT: "5678"
      N8N_SECURE_COOKIE: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_RUNNERS_ENABLED: "true"
      GENERIC_TIMEZONE: America/Argentina/Buenos_Aires
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"

  mock-isis-api:
    build: ./mock-isis-api
    container_name: baigorria-mock-isis
    restart: unless-stopped
    environment:
      PORT: "4000"
    ports:
      - "4000:4000"

volumes:
  pgdata:
  n8n_data:
