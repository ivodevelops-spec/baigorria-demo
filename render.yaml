services:
  - type: web
    name: baigorria-demo
    runtime: node
    plan: free
    buildCommand: cd web && npm install && npm run build && cd ../api && npm install
    startCommand: cd api && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: META_VERIFY_TOKEN
        generateValue: true
      - key: SHEETS_WEBHOOK_SECRET
        generateValue: true
